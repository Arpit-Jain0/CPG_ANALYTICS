name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint & Test (Python 3.11)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       cpg_analytics_test
          POSTGRES_USER:     cpg
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cpg -d cpg_analytics_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Used by src/common/db.py at import time (engine is created but never
      # actually connected in mocked API tests).
      DATABASE_URL:       postgresql+psycopg2://cpg:changeme@localhost:5432/cpg_analytics_test
      POSTGRES_HOST:      localhost
      POSTGRES_PORT:      5432
      POSTGRES_DB:        cpg_analytics_test
      POSTGRES_USER:      cpg
      POSTGRES_PASSWORD:  changeme
      # Signals to integration tests that a real DB is available.
      TEST_DATABASE_URL:  postgresql+psycopg2://cpg:changeme@localhost:5432/cpg_analytics_test
      # LLM is mocked in all tests — no Ollama server needed.
      OLLAMA_BASE_URL:    http://localhost:11434/v1
      OLLAMA_MODEL:       llama3.1
      APP_ENV:            test
      LOG_LEVEL:          WARNING

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: cpg-analytics
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: cpg-analytics
        run: ruff check src tests

      - name: Black format check
        working-directory: cpg-analytics
        run: black --check src tests

      - name: Run tests
        working-directory: cpg-analytics
        run: |
          pytest \
            --tb=short \
            -q \
            --cov=src \
            --cov-report=term-missing \
            tests/

  docker-build:
    name: Docker image build check
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        working-directory: cpg-analytics
        run: docker build -f Dockerfile.api -t cpg-api:ci .

      - name: Build UI image
        working-directory: cpg-analytics
        run: docker build -f Dockerfile.ui -t cpg-ui:ci .
