version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-cpg_analytics}
      POSTGRES_USER:     ${POSTGRES_USER:-cpg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro   # *.sql run in filename order on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cpg} -d ${POSTGRES_DB:-cpg_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Ollama — local LLM server ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # model weights persist across restarts
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── ollama-init — pulls the model once and exits ──────────────────────────
  # Runs after ollama is healthy; API starts in parallel and uses fallback
  # responses until the model download completes (typically 5–15 minutes on
  # first run). Subsequent starts skip the pull if the model is cached.
  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.1}"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:    postgresql+psycopg2://${POSTGRES_USER:-cpg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-cpg_analytics}
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL:    ${OLLAMA_MODEL:-llama3.1}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pg_data:
  ollama_data:
